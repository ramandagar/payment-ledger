services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports: ["5432:5432"]
    volumes: [dbdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger
      PORT: 4000
      CORS_ORIGIN: "*"
    depends_on:
      db: { condition: service_healthy }
    ports: ["4000:4000"]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    ports: ["5173:80"]
    depends_on: [api]

volumes:
  dbdata:
